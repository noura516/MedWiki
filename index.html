<script>
// ════════════════════════════════════════════════════════════════════════════

function renderBlocksToHTML(blocks) {
  if (!blocks || !blocks.length) return '<span style="color:#6b7280;font-style:italic">—</span>';
  return blocks.map(function(b) {
    if (b.type === "text") return '<p style="margin:0 0 4px">' + (b.content||"").replace(/
/g,"<br/>") + '</p>';
    if (b.type === "image") return b.content ? '<img src="' + b.content + '" style="max-width:100%;border-radius:4px"/>' : "";
    if (b.type === "mindmap") return '<em style="color:#6b7280">🗺 Mind map</em>';
    if (b.type === "table") {
      var rows = (b.content && b.content.rows) || [];
      var headers = (b.content && b.content.headers) || [];
      return '<table style="border-collapse:collapse;width:100%;font-size:12px"><thead><tr>' +
        headers.map(function(h){ return '<th style="border:1px solid #2d3748;padding:4px 8px;background:#161b22;color:#d4a017;text-align:left">' + h + '</th>'; }).join("") +
        '</tr></thead><tbody>' +
        rows.map(function(row){ return '<tr>' + row.map(function(cell){ return '<td style="border:1px solid #2d3748;padding:4px 8px">' + cell + '</td>'; }).join("") + '</tr>'; }).join("") +
        '</tbody></table>';
    }
    var prefixes = {bullet:"•", arrow:"→"};
    var items = b.content || [];
    return '<div>' + items.map(function(it, i) {
      var prefix = b.type==="check" ? (it.checked?"☑":"☐") :
                   b.type==="numbered" ? (i+1)+"." :
                   b.type==="alpha" ? String.fromCharCode(97+i)+"." :
                   b.type==="roman" ? (["i","ii","iii","iv","v","vi","vii","viii","ix","x"][i]||i+1)+"." :
                   (prefixes[b.type]||"•");
      return '<div style="display:flex;gap:6px;margin-bottom:2px"><span style="color:#d4a017;min-width:18px;font-family:monospace">' + prefix + '</span><span>' + (it.text||"") + '</span></div>';
    }).join("") + '</div>';
  }).join("");
}

function buildExportHTML(entries, globalColumns, title) {
  var cols = globalColumns;
  var date = new Date().toLocaleDateString();
  var style = '<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1117;color:#e8dcc8;font-family:Segoe UI,sans-serif;padding:32px;}h1{font-family:Georgia,serif;color:#d4a017;font-size:22px;margin-bottom:6px;}.subtitle{color:#6b7280;font-size:12px;margin-bottom:24px;font-family:monospace;}.entry{background:#161b22;border:1px solid #2d3748;border-radius:10px;padding:20px;margin-bottom:20px;page-break-inside:avoid;}.entry-name{font-family:Georgia,serif;font-size:18px;color:#f0c040;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2d3748;}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}.tag{background:rgba(212,160,23,.15);color:#d4a017;border:1px solid rgba(212,160,23,.3);border-radius:4px;padding:2px 8px;font-size:11px;font-family:monospace;}.col{margin-bottom:14px;}.col-label{font-size:11px;font-family:monospace;color:#d4a017;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}.col-body{font-size:13px;line-height:1.6;}.footer{margin-top:24px;font-size:11px;color:#374151;font-family:monospace;text-align:right;}</style>';
  var body = '<h1>📚 ' + title + '</h1><div class="subtitle">MedWiki · Exported ' + date + '</div>';
  entries.forEach(function(entry) {
    var entryHTML = '<div class="entry"><div class="entry-name">' + entry.name + '</div>';
    if (entry.tags && entry.tags.length) {
      entryHTML += '<div class="tags">' + entry.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join("") + '</div>';
    }
    cols.forEach(function(col) {
      var blocks = (entry.fields && entry.fields[col]) || [];
      var hasContent = blocks.some(function(b){ return b.type==="text" ? b.content : b.type==="image" ? b.content : (b.content||b.mindmap); });
      if (hasContent) {
        entryHTML += '<div class="col"><div class="col-label">' + col + '</div><div class="col-body">' + renderBlocksToHTML(blocks) + '</div></div>';
      }
    });
    entryHTML += '</div>';
    body += entryHTML;
  });
  body += '<div class="footer">📚 MedWiki</div>';
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"/>' + style + '</head><body>' + body + '</body></html>';
}

function buildCompareExportHTML(entries, visibleCols) {
  var date = new Date().toLocaleDateString();
  var style = '<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1117;color:#e8dcc8;font-family:Segoe UI,sans-serif;padding:24px;}h1{font-family:Georgia,serif;color:#d4a017;font-size:20px;margin-bottom:6px;}.subtitle{color:#6b7280;font-size:12px;margin-bottom:20px;font-family:monospace;}.t{width:100%;border-collapse:collapse;font-size:13px;}.t th{background:#161b22;color:#d4a017;border:1px solid #2d3748;padding:8px 12px;text-align:left;font-family:monospace;font-size:11px;text-transform:uppercase;white-space:nowrap;}.t th:first-child{width:120px;color:#6b7280;}.t td{border:1px solid #2d3748;padding:8px 12px;vertical-align:top;line-height:1.6;}.t tr:nth-child(even) td{background:#0d1117;}.footer{margin-top:20px;font-size:11px;color:#374151;font-family:monospace;text-align:right;}</style>';
  var subtitle = entries.map(function(e){ return e.name; }).join(" · ") + " · MedWiki · " + date;
  var thead = '<tr><th>Field</th>' + entries.map(function(e){ return '<th>' + e.name + '</th>'; }).join("") + '</tr>';
  var tbody = visibleCols.map(function(col) {
    return '<tr><td style="color:#d4a017;font-family:monospace;font-size:11px;text-transform:uppercase">' + col + '</td>' +
      entries.map(function(e){ return '<td>' + renderBlocksToHTML((e.fields && e.fields[col]) || []) + '</td>'; }).join("") + '</tr>';
  }).join("");
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"/>' + style + '</head><body><h1>⚖️ Comparison</h1><div class="subtitle">' + subtitle + '</div><table class="t"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table><div class="footer">📚 MedWiki</div></body></html>';
}

async function exportToPDF(htmlContent) {
  var win = window.open("", "_blank");
  win.document.write(htmlContent);
  win.document.close();
  win.focus();
  setTimeout(function(){ win.print(); }, 800);
}

async function exportToPNG(htmlContent, filename) {
  var iframe = document.createElement("iframe");
  iframe.style.cssText = "position:fixed;left:-9999px;top:0;width:800px;border:none;";
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(htmlContent);
  iframe.contentDocument.close();
  await new Promise(function(r){ setTimeout(r, 600); });
  iframe.style.height = iframe.contentDocument.body.scrollHeight + "px";
  await new Promise(function(r){ setTimeout(r, 200); });
  try {
    var canvas = await html2canvas(iframe.contentDocument.body, {
      backgroundColor: "#0d1117", scale: 2, useCORS: true, logging: false,
      width: 800, height: iframe.contentDocument.body.scrollHeight,
    });
    document.body.removeChild(iframe);
    var a = document.createElement("a");
    a.download = filename + ".png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  } catch(e) {
    document.body.removeChild(iframe);
    var blob = new Blob([htmlContent], {type:"text/html"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename + ".html"; a.click();
    URL.revokeObjectURL(url);
  }
}

async function fbLoad(uid) {
  const { db } = window._firebase;
  const snap = await db.collection("users").doc(uid).collection("kb").doc("data").get();
  return snap.exists ? snap.data().payload : null;
}
async function fbSave(uid, data) {
  const str = typeof data === "string" ? data : JSON.stringify(data);
  const { db } = window._firebase;
  await db.collection("users").doc(uid).collection("kb").doc("data").set({ payload: str, updatedAt: Date.now() });
}

const uid = () => Math.random().toString(36).slice(2, 10);

const DEFAULT_COLUMNS = ["Definition","Clinical Features","Risk Factors","Investigations","Management","Prognosis","Gross Pathology","Microscopy"];

const BLOCK_TYPES = [
  { type:"text",     label:"Text",      icon:"¶"  },
  { type:"bullet",   label:"Bullets",   icon:"•"  },
  { type:"numbered", label:"Numbered",  icon:"1." },
  { type:"alpha",    label:"Alpha",     icon:"a." },
  { type:"roman",    label:"Roman",     icon:"i." },
  { type:"check",    label:"Checklist", icon:"☑"  },
  { type:"arrow",    label:"Arrows",    icon:"→"  },
  { type:"mindmap",  label:"Mind Map",  icon:"✦"  },
  { type:"image",    label:"Image",     icon:"🖼"  },
  { type:"table",    label:"Table",     icon:"⊞"  },
];

const makeBlock = (type) => ({
  id:uid(), type,
  content: type==="text" ? "" : type==="image" ? null : type==="table" ? {rows:[["",""],["",""]],headers:["Column 1","Column 2"]} : [],
  mindmap: type==="mindmap" ? {center:"Topic",nodes:[],layout:"radial"} : undefined,
});
const makeListItem = () => ({ id:uid(), text:"", checked:false });
const getPrefix = (type,idx) => {
  if(type==="bullet")  return "•";
  if(type==="numbered")return `${idx+1}.`;
  if(type==="alpha")   return `${String.fromCharCode(97+idx)}.`;
  if(type==="roman")   return (["i","ii","iii","iv","v","vi","vii","viii","ix","x"][idx])||`${idx+1}.`;
  if(type==="arrow")   return "→";
  return "";
};

const INITIAL_DATA = {
  tree:{ id:"root", name:"My Knowledge Base", type:"folder", children:[] },
  entries:{}, globalColumns: DEFAULT_COLUMNS, trash:[],
};

function findNode(node,id){ if(node.id===id)return node; if(node.children)for(const c of node.children){const f=findNode(c,id);if(f)return f;} return null; }
function getAllEntries(node,acc=[]){ if(node.type==="entry")acc.push(node.id); (node.children||[]).forEach(c=>getAllEntries(c,acc)); return acc; }
function updateNodeTree(tree,id,fn){ if(tree.id===id)return fn(tree); return{...tree,children:(tree.children||[]).map(c=>updateNodeTree(c,id,fn))}; }
function removeNodeTree(tree,id){ return{...tree,children:(tree.children||[]).filter(c=>c.id!==id).map(c=>removeNodeTree(c,id))}; }
function getPath(tree,id,path=[]){ if(tree.id===id)return path; if(tree.children)for(const c of tree.children){const r=getPath(c,id,[...path,tree]);if(r)return r;} return null; }
function reorderChildren(tree,parentId,fromIdx,toIdx){
  return updateNodeTree(tree,parentId,n=>{
    const ch=[...(n.children||[])];
    const [item]=ch.splice(fromIdx,1);
    ch.splice(toIdx,0,item);
    return{...n,children:ch};
  });
}
function cloneSubtree(node){
  const idMap={};
  function clone(n){
    const newId=uid(); idMap[n.id]=newId;
    if(n.type==="entry") return{...n,id:newId};
    return{...n,id:newId,children:(n.children||[]).map(clone)};
  }
  return[clone(node),idMap];
}

// ════════════════════════════════════════════════════════════════════════════
// MIND MAP (abbreviated — full version preserved)
// ════════════════════════════════════════════════════════════════════════════
function MindMap({block,onUpdate}){
  const mm=block.mindmap||{center:"Topic",nodes:[],layout:"radial"};
  const W=520,H=320,cx=W/2,cy=H/2;
  const [editing,setEditing]=useState(null);
  const [editVal,setEditVal]=useState("");
  const svgRef=useRef();
  const [pan,setPan]=useState({x:0,y:0});
  const [zoom,setZoom]=useState(1);
  const panRef=useRef(null);

  const saveEdit=()=>{
    if(editing==="center"){onUpdate({...block,mindmap:{...mm,center:editVal}});}
    else{const nodes=mm.nodes.map(n=>n.id===editing?{...n,text:editVal}:n);onUpdate({...block,mindmap:{...mm,nodes}});}
    setEditing(null);
  };

  const positions=(nodes,layout)=>{
    const pos={};
    if(layout==="radial"){
      const roots=nodes.filter(n=>!n.parent);
      roots.forEach((n,i)=>{const a=(2*Math.PI*i/roots.length)-Math.PI/2;pos[n.id]={x:cx+120*Math.cos(a),y:cy+90*Math.sin(a)};});
      const walk=(pid,depth)=>{const ch=nodes.filter(n=>n.parent===pid);ch.forEach((n,i)=>{const pa=pos[pid]||{x:cx,y:cy};const a=Math.atan2(pa.y-cy,pa.x-cx)+(i-ch.length/2)*0.5;const r=80+depth*60;pos[n.id]={x:pa.x+r*Math.cos(a),y:pa.y+r*Math.sin(a)};walk(n.id,depth+1);});};
      roots.forEach(n=>walk(n.id,1));
    }else if(layout==="tree"){
      const roots=nodes.filter(n=>!n.parent);const cols={};
      const assign=(pid,col,row)=>{const ch=nodes.filter(n=>n.parent===pid);ch.forEach((n,i)=>{pos[n.id]={x:100+col*130,y:40+row*60};assign(n.id,col+1,row+i);});return ch.length;};
      let r=0;roots.forEach(n=>{pos[n.id]={x:100,y:40+r*60};r+=assign(n.id,1,r)+1;});
    }else if(layout==="circle"){
      nodes.forEach((n,i)=>{const a=(2*Math.PI*i/nodes.length)-Math.PI/2;pos[n.id]={x:cx+140*Math.cos(a),y:cy+100*Math.sin(a)};});
    }else{
      nodes.forEach((n,i)=>{pos[n.id]={x:80+(i%4)*110,y:60+Math.floor(i/4)*70};});
    }
    return pos;
  };

  const pos=positions(mm.nodes,mm.layout);
  const addNode=()=>{const id=uid();onUpdate({...block,mindmap:{...mm,nodes:[...mm.nodes,{id,text:"Node",parent:null}]}});};
  const delNode=id=>onUpdate({...block,mindmap:{...mm,nodes:mm.nodes.filter(n=>n.id!==id&&n.parent!==id)}});
  const layouts=["radial","tree","circle","grid"];

  return(<div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",background:"var(--bg3)"}}>
    <div style={{display:"flex",gap:6,padding:"6px 10px",background:"var(--bg4)",borderBottom:"1px solid var(--border)",flexWrap:"wrap"}}>
      {layouts.map(l=><button key={l} onClick={()=>onUpdate({...block,mindmap:{...mm,layout:l}})}
        style={{fontSize:10,fontFamily:"IBM Plex Mono,monospace",padding:"2px 8px",border:`1px solid ${mm.layout===l?"var(--amber)":"var(--border)"}`,
        borderRadius:3,background:mm.layout===l?"var(--amber-dim)":"none",color:mm.layout===l?"var(--amber)":"var(--text3)",cursor:"pointer"}}>{l}</button>)}
      <button onClick={addNode} style={{fontSize:10,fontFamily:"IBM Plex Mono,monospace",padding:"2px 8px",border:"1px solid var(--border)",borderRadius:3,background:"none",color:"var(--text3)",cursor:"pointer",marginLeft:"auto"}}>+ node</button>
    </div>
    <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",cursor:"grab",minHeight:180}}>
      <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
        {mm.nodes.map(n=>{const p=n.parent?pos[n.parent]:null;const np=pos[n.id];if(!np)return null;return p?<line key={`l${n.id}`} x1={cx} y1={cy} x2={np.x} y2={np.y} stroke="var(--border)" strokeWidth="1.5"/>:null;})}
        {mm.nodes.map(n=>{const np=pos[n.id];if(!np)return null;return(<g key={n.id}>
          <line x1={cx} y1={cy} x2={np.x} y2={np.y} stroke="var(--border)" strokeWidth="1.5"/>
          <circle cx={np.x} cy={np.y} r={24} fill="var(--bg4)" stroke="var(--amber)" strokeWidth="1.5" style={{cursor:"pointer"}} onDoubleClick={()=>{setEditing(n.id);setEditVal(n.text);}}/>
          {editing===n.id
            ?<foreignObject x={np.x-30} y={np.y-10} width={60} height={20}>
              <input value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={saveEdit} onKeyDown={e=>e.key==="Enter"&&saveEdit()} autoFocus style={{width:"100%",background:"var(--bg)",border:"1px solid var(--amber)",borderRadius:3,color:"var(--text)",fontSize:10,textAlign:"center",outline:"none"}}/>
            </foreignObject>
            :<text x={np.x} y={np.y+4} textAnchor="middle" fill="var(--text)" fontSize={10} style={{pointerEvents:"none",userSelect:"none"}}>{n.text}</text>}
          <text x={np.x+18} y={np.y-18} fill="var(--red)" fontSize={12} style={{cursor:"pointer"}} onClick={()=>delNode(n.id)}>×</text>
        </g>);})}
        <circle cx={cx} cy={cy} r={34} fill="var(--amber-dim)" stroke="var(--amber)" strokeWidth={2} style={{cursor:"pointer"}} onDoubleClick={()=>{setEditing("center");setEditVal(mm.center);}}/>
        {editing==="center"
          ?<foreignObject x={cx-36} y={cy-10} width={72} height={20}>
            <input value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={saveEdit} onKeyDown={e=>e.key==="Enter"&&saveEdit()} autoFocus style={{width:"100%",background:"var(--bg)",border:"1px solid var(--amber)",borderRadius:3,color:"var(--amber)",fontSize:11,textAlign:"center",outline:"none"}}/>
          </foreignObject>
          :<text x={cx} y={cy+4} textAnchor="middle" fill="var(--amber)" fontSize={11} fontWeight="bold" style={{pointerEvents:"none",userSelect:"none"}}>{mm.center}</text>}
      </g>
    </svg>
  </div>);
}

// BLOCKS
// ════════════════════════════════════════════════════════════════════════════
function ListRow({item,index,type,onChange,onDelete,onEnter}){
  return(<div className="list-row">
    {type==="check"
      ?<input type="checkbox" className="entry-select-check" checked={item.checked} onChange={e=>onChange({...item,checked:e.target.checked})}/>
      :<span className="list-prefix">{getPrefix(type,index)}</span>}
    <input className="list-input" value={item.text} placeholder="Item…"
      style={{textDecoration:type==="check"&&item.checked?"line-through":"none",color:type==="check"&&item.checked?"var(--text3)":"var(--text)"}}
      onChange={e=>onChange({...item,text:e.target.value})}
      onKeyDown={e=>{if(e.key==="Enter")onEnter();}}/>
    <button className="list-del" onClick={onDelete}>✕</button>
  </div>);
}

function ListBlock({block,onUpdate}){
  const [items,setItems]=useState(()=>Array.isArray(block.content)?block.content:[]);
  const prevId=useRef(block.id);
  useEffect(()=>{if(prevId.current!==block.id){setItems(Array.isArray(block.content)?block.content:[]);prevId.current=block.id;}},[block.id]);
  const commit=next=>{setItems(next);onUpdate({...block,content:next});};
  return(<div className="block-body">
    {items.map((item,i)=><ListRow key={item.id} item={item} index={i} type={block.type}
      onChange={u=>commit(items.map(x=>x.id===item.id?u:x))}
      onDelete={()=>commit(items.filter(x=>x.id!==item.id))}
      onEnter={()=>commit([...items,makeListItem()])}/>)}
    <button className="add-item-btn" onClick={()=>commit([...items,makeListItem()])}>+ add item</button>
  </div>);
}

function TextBlock({block,onUpdate}){
  const [val,setVal]=useState(block.content||"");
  const prevId=useRef(block.id);
  const saveTimer=useRef(null);
  useEffect(()=>{if(prevId.current!==block.id){setVal(block.content||"");prevId.current=block.id;}},[block.id]);
  const handleChange=e=>{
    const v=e.target.value; setVal(v);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>onUpdate({...block,content:v}),300);
  };
  return(<div className="block-body"><textarea className="block-textarea" value={val} placeholder="Type here…" onChange={handleChange} onBlur={()=>onUpdate({...block,content:val})}/></div>);
}

function ImageBlock({block,onUpdate}){
  const [urlInput,setUrlInput]=useState("");
  const [showUrl,setShowUrl]=useState(false);
  const [dragging,setDragging]=useState(false);
  const [error,setError]=useState(false);

  const readFile=file=>{
    if(!file||!file.type.startsWith("image/"))return;
    const reader=new FileReader();
    reader.onload=ev=>onUpdate({...block,content:ev.target.result,fileName:file.name});
    reader.readAsDataURL(file);
  };

  const applyUrl=()=>{
    if(!urlInput.trim())return;
    onUpdate({...block,content:urlInput.trim(),fileName:""});
    setUrlInput("");setShowUrl(false);
  };

  if(block.content){
    return(<div className="block-body" style={{padding:10}}>
      <img src={block.content} alt={block.fileName||"image"} onError={()=>setError(true)} onLoad={()=>setError(false)}
        style={{maxWidth:"100%",maxHeight:320,borderRadius:6,objectFit:"contain",display:"block"}}/>
      {error&&<div style={{fontSize:12,color:"var(--red)",fontFamily:"IBM Plex Mono,monospace",marginTop:6}}>⚠ Could not load image.</div>}
      <button onClick={()=>onUpdate({...block,content:null,fileName:null})}
        style={{marginTop:8,fontSize:11,fontFamily:"IBM Plex Mono,monospace",background:"none",border:"1px solid var(--border)",color:"var(--text3)",borderRadius:4,padding:"4px 12px",cursor:"pointer"}}>
        🔄 Change image
      </button>
    </div>);
  }

  return(<div className="block-body" style={{padding:12,display:"flex",flexDirection:"column",gap:10}}>
    <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);readFile(e.dataTransfer.files?.[0]);}}
      style={{border:`2px dashed ${dragging?"var(--amber)":"var(--border)"}`,borderRadius:8,padding:"18px 12px",
        background:dragging?"var(--amber-dim)":"transparent",transition:"all .2s",textAlign:"center"}}>
      <div style={{fontSize:26,marginBottom:6}}>🖼️</div>
      <div style={{fontSize:13,color:"var(--text)",marginBottom:12}}>Pick or drop an image</div>
      <input type="file" accept="image/*" onChange={e=>readFile(e.target.files?.[0])}
        style={{display:"block",width:"100%",fontSize:13,color:"var(--text)",fontFamily:"IBM Plex Mono,monospace",cursor:"pointer"}}/>
    </div>
    {!showUrl
      ?<button onClick={()=>setShowUrl(true)} style={{fontSize:12,fontFamily:"IBM Plex Mono,monospace",background:"none",border:"1px solid var(--border)",color:"var(--text3)",borderRadius:4,padding:"6px 12px",cursor:"pointer"}}>
          🔗 Use image URL instead
        </button>
      :<div style={{display:"flex",flexDirection:"column",gap:6}}>
        <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&applyUrl()}
          placeholder="https://example.com/image.jpg"
          style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:4,padding:"8px 10px",color:"var(--text)",fontSize:13,outline:"none",width:"100%"}}/>
        <div style={{display:"flex",gap:6}}>
          <button onClick={applyUrl} style={{flex:1,background:"var(--amber)",color:"var(--bg)",border:"none",borderRadius:4,padding:"7px",fontSize:12,fontFamily:"IBM Plex Mono,monospace",cursor:"pointer"}}>Add Image</button>
          <button onClick={()=>setShowUrl(false)} style={{background:"none",border:"1px solid var(--border)",color:"var(--text3)",borderRadius:4,padding:"7px 12px",fontSize:12,fontFamily:"IBM Plex Mono,monospace",cursor:"pointer"}}>Cancel</button>
        </div>
      </div>}
  </div>);
}

function TableBlock({block,onUpdate}){
  const tbl=block.content||{headers:["Column 1","Column 2"],rows:[["",""]]};
  const setTbl=next=>onUpdate({...block,content:next});
  const setHeader=(i,v)=>{const h=[...tbl.headers];h[i]=v;setTbl({...tbl,headers:h});};
  const setCell=(r,c,v)=>{const rows=tbl.rows.map(row=>[...row]);rows[r][c]=v;setTbl({...tbl,rows});};
  const addRow=()=>setTbl({...tbl,rows:[...tbl.rows,tbl.headers.map(()=>"")]});
  const addCol=()=>setTbl({...tbl,headers:[...tbl.headers,`Column ${tbl.headers.length+1}`],rows:tbl.rows.map(r=>[...r,""])});
  const delRow=i=>setTbl({...tbl,rows:tbl.rows.filter((_,ri)=>ri!==i)});
  const delCol=i=>setTbl({...tbl,headers:tbl.headers.filter((_,ci)=>ci!==i),rows:tbl.rows.map(r=>r.filter((_,ci)=>ci!==i))});
  return(<div className="block-body table-block">
    <div style={{overflowX:"auto"}}>
      <table>
        <thead><tr>
          <th style={{width:28,background:"var(--bg3)",border:"1px solid var(--border)"}}></th>
          {tbl.headers.map((h,i)=><th key={i}><div style={{display:"flex",flexDirection:"column"}}>
            <input className="table-header-input" value={h} onChange={e=>setHeader(i,e.target.value)} placeholder={`Col ${i+1}`}/>
            {tbl.headers.length>1&&<button className="table-del-col" onClick={()=>delCol(i)}>✕ col</button>}
          </div></th>)}
        </tr></thead>
        <tbody>{tbl.rows.map((row,ri)=><tr key={ri}>
          <td style={{background:"var(--bg3)",border:"1px solid var(--border)",textAlign:"center",minWidth:32}}>
            <button onClick={()=>delRow(ri)} style={{background:"none",border:"none",color:"var(--red)",fontSize:13,padding:"4px 8px",cursor:"pointer"}}>✕</button>
          </td>
          {row.map((cell,ci)=><td key={ci}><input className="table-cell-input" value={cell} onChange={e=>setCell(ri,ci,e.target.value)} placeholder="…"/></td>)}
        </tr>)}</tbody>
      </table>
    </div>
    <div className="table-footer">
      <button className="table-add-btn" onClick={addRow}>+ Row</button>
      <button className="table-add-btn" onClick={addCol}>+ Column</button>
    </div>
  </div>);
}

function Block({block,onUpdate,onDelete}){
  const meta=BLOCK_TYPES.find(b=>b.type===block.type);
  return(<div className="block-wrap">
    <div className="block-header">
      <span className="block-badge">{meta?.icon} {meta?.label}</span>
      <div style={{flex:1}}/>
      <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:12,padding:"2px 6px"}} onClick={onDelete}>✕</button>
    </div>
    {block.type==="text"    &&<TextBlock block={block} onUpdate={onUpdate}/>}
    {block.type==="mindmap" &&<MindMap   block={block} onUpdate={onUpdate}/>}
    {block.type==="image"   &&<ImageBlock block={block} onUpdate={onUpdate}/>}
    {block.type==="table"   &&<TableBlock block={block} onUpdate={onUpdate}/>}
    {!["text","mindmap","image","table"].includes(block.type)&&<ListBlock block={block} onUpdate={onUpdate}/>}
  </div>);
}

function FieldSection({entryId,col,initialBlocks,onSave,onRemoveCol,onRenameCol}){
  const [blocks,setBlocks]=useState(initialBlocks||[]);
  const [pickerOpen,setPicker]=useState(false);
  const [editingTitle,setEditingTitle]=useState(false);
  const [titleVal,setTitleVal]=useState(col);
  const titleInputRef=useRef();
  const prevKey=useRef(`${entryId}::${col}`);
  const pickerRef=useRef();
  const history=useRef([]);
  const MAX_HISTORY=30;

  useEffect(()=>{const k=`${entryId}::${col}`;if(prevKey.current!==k){setBlocks(initialBlocks||[]);history.current=[];prevKey.current=k;}},[entryId,col]);
  useEffect(()=>{if(!pickerOpen)return;const h=e=>{if(pickerRef.current&&!pickerRef.current.contains(e.target))setPicker(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[pickerOpen]);

  const [canUndo,setCanUndo]=useState(false);
  const commit=(b,pushHistory=true)=>{
    if(pushHistory){history.current=[...history.current,blocks].slice(-MAX_HISTORY);setCanUndo(true);}
    setBlocks(b);onSave(col,b);
  };
  const undo=()=>{
    if(!history.current.length)return;
    const prev=history.current[history.current.length-1];
    history.current=history.current.slice(0,-1);
    setCanUndo(history.current.length>0);
    setBlocks(prev);onSave(col,prev);
  };
  const addBlock=type=>{commit([...blocks,makeBlock(type)]);setPicker(false);};

  return(<div className="field-row">
    <div className="field-add-col" ref={pickerRef}>
      <button className="field-add-btn" onClick={()=>setPicker(o=>!o)} title="Add block">+</button>
      {pickerOpen&&<div className="block-picker">
        <div className="block-picker-title">ADD BLOCK</div>
        {BLOCK_TYPES.map(bt=><button key={bt.type} className="block-picker-btn" onMouseDown={e=>{e.preventDefault();addBlock(bt.type);}}><span className="block-picker-icon">{bt.icon}</span>{bt.label}</button>)}
      </div>}
    </div>
    <div className="field-card">
      <div className="field-card-header">
        {editingTitle
          ?<input ref={titleInputRef} value={titleVal}
              style={{background:"var(--bg4)",border:"1px solid var(--amber)",borderRadius:4,padding:"2px 8px",color:"var(--amber2)",fontSize:11,fontFamily:"IBM Plex Mono,monospace",outline:"none",width:"100%",maxWidth:180}}
              onChange={e=>setTitleVal(e.target.value)}
              onBlur={()=>{setEditingTitle(false);onRenameCol(titleVal);}}
              onKeyDown={e=>{if(e.key==="Enter"){setEditingTitle(false);onRenameCol(titleVal);}if(e.key==="Escape"){setEditingTitle(false);setTitleVal(col);}}}/>
          :<span className="field-card-title" style={{cursor:"pointer"}} onClick={()=>{setTitleVal(col);setEditingTitle(true);setTimeout(()=>titleInputRef.current?.focus(),50);}}>{col}</span>}
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {canUndo&&<button className="tree-btn" onClick={undo} style={{fontSize:13,color:"var(--amber)"}}>↩ undo</button>}
          <button className="tree-btn del" onClick={onRemoveCol} style={{fontSize:11}}>✕ col</button>
        </div>
      </div>
      <div className="field-card-body">
        {blocks.map(block=><Block key={block.id} block={block}
          onUpdate={upd=>commit(blocks.map(b=>b.id===block.id?upd:b))}
          onDelete={()=>commit(blocks.filter(b=>b.id!==block.id))}/>)}
      </div>
    </div>
  </div>);
}

function EntryView({entryId}){
  const {data,update,setModal,setActiveId,setView}=useApp();
  const entry=data.entries[entryId];
  const [colConfirm,setColConfirm]=useState(null);
  const [deletedCol,setDeletedCol]=useState(null);
  const [showExportMenu,setShowExportMenu]=useState(false);
  const undoTimer=useRef(null);

  if(!entry)return <div className="empty"><div className="empty-icon">🔍</div><p>Entry not found.</p></div>;

  const doExportPDF=()=>{
    const html=buildExportHTML([entry],data.globalColumns,entry.name);
    exportToPDF(html,entry.name);
    setShowExportMenu(false);
  };
  const doExportHTML=()=>{
    const html=buildExportHTML([entry],data.globalColumns,entry.name);
    exportToPNG(html,entry.name);
    setShowExportMenu(false);
  };

  const saveField=useCallback((col,blocks)=>{update(prev=>({...prev,entries:{...prev.entries,[entryId]:{...prev.entries[entryId],fields:{...prev.entries[entryId].fields,[col]:blocks}}}}));},[entryId,update]);

  const removeCol=col=>{
    const snapshot={col,index:data.globalColumns.indexOf(col),allFields:Object.fromEntries(Object.entries(data.entries).map(([id,e])=>[id,e.fields?.[col]||[]]))};
    update(prev=>({...prev,globalColumns:prev.globalColumns.filter(c=>c!==col),entries:Object.fromEntries(Object.entries(prev.entries).map(([id,e])=>{const f={...e.fields};delete f[col];return[id,{...e,fields:f}];}))}));
    setDeletedCol(snapshot);
    clearTimeout(undoTimer.current);
    undoTimer.current=setTimeout(()=>setDeletedCol(null),8000);
  };

  const undoRemoveCol=()=>{
    if(!deletedCol)return;
    clearTimeout(undoTimer.current);
    update(prev=>{
      const cols=[...prev.globalColumns];cols.splice(deletedCol.index,0,deletedCol.col);
      const entries=Object.fromEntries(Object.entries(prev.entries).map(([id,e])=>[id,{...e,fields:{...e.fields,[deletedCol.col]:deletedCol.allFields[id]||[]}}]));
      return{...prev,globalColumns:cols,entries};
    });
    setDeletedCol(null);
  };

  const renameCol=(oldCol,newCol)=>{
    if(!newCol.trim()||newCol===oldCol)return;
    update(prev=>({...prev,globalColumns:prev.globalColumns.map(c=>c===oldCol?newCol:c),entries:Object.fromEntries(Object.entries(prev.entries).map(([id,e])=>{const f={...e.fields};f[newCol]=f[oldCol]||[];delete f[oldCol];return[id,{...e,fields:f}];}))}));
  };

  return(<div className="entry-grid fade-in">
    {colConfirm&&<div className="modal-overlay" onClick={()=>setColConfirm(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:340}}>
        <h3>🗑 Delete Column?</h3>
        <p style={{fontSize:14,color:"var(--text)",lineHeight:1.7,marginBottom:18}}>
          Delete <strong style={{color:"var(--amber)"}}>{colConfirm}</strong> from all entries?
          <span style={{display:"block",marginTop:6,fontSize:12,color:"var(--text3)"}}>You can undo immediately after.</span>
        </p>
        <div className="modal-btns">
          <button className="btn btn-ghost" onClick={()=>setColConfirm(null)}>Cancel</button>
          <button style={{background:"var(--red)",color:"#fff",border:"none",padding:"6px 16px",borderRadius:"var(--radius)",fontFamily:"IBM Plex Mono,monospace",fontSize:12,cursor:"pointer"}}
            onClick={()=>{removeCol(colConfirm);setColConfirm(null);}}>Delete</button>
        </div>
      </div>
    </div>}
    {deletedCol&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"var(--bg2)",border:"1px solid var(--amber)",borderRadius:10,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>
      <span style={{fontSize:13,color:"var(--text)"}}>Column <strong style={{color:"var(--amber)"}}>{deletedCol.col}</strong> deleted</span>
      <button className="btn btn-amber btn-sm" onClick={undoRemoveCol}>↩ Undo</button>
    </div>}
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4,position:"relative"}}>
      <button onClick={()=>setShowExportMenu(v=>!v)} className="btn btn-ghost btn-sm" style={{fontSize:11}}>↗ Export</button>
      {showExportMenu&&<ExportMenu onExportPDF={doExportPDF} onExportPNG={doExportHTML} onClose={()=>setShowExportMenu(false)}/>}
    </div>
    <TagRow entryId={entryId}/>
    {data.globalColumns.map(col=><FieldSection key={`${entryId}::${col}`} entryId={entryId} col={col} initialBlocks={entry.fields?.[col]||[]} onSave={saveField} onRemoveCol={()=>setColConfirm(col)} onRenameCol={(newCol)=>renameCol(col,newCol)}/>)}
    <button className="btn btn-ghost" style={{alignSelf:"flex-start",marginLeft:38}} onClick={()=>setModal({type:"addcol"})}>+ Add Column</button>
  </div>);
}

function TrashView(){
  const {data,update}=useApp();
  const trash=data.trash||[];
  const [confirm,setConfirm]=useState(null);
  const fmt=ts=>{const d=Date.now()-ts;if(d<60000)return"just now";if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return new Date(ts).toLocaleDateString();};
  const restore=item=>{
    update(prev=>{
      const parentId=item.parentId||"root";
      const parentExists=findNode(prev.tree,parentId);
      const targetId=parentExists?parentId:"root";
      const newTree=updateNodeTree(prev.tree,targetId,n=>({...n,children:[...(n.children||[]),item.subtree]}));
      return{...prev,tree:newTree,entries:{...prev.entries,...item.entries},trash:(prev.trash||[]).filter(x=>x.id!==item.id)};
    });
  };
  const permDel=item=>setConfirm({title:"Permanently Delete?",message:<>Permanently delete <strong style={{color:"var(--amber)"}}>{item.name}</strong>?<span style={{display:"block",marginTop:6,color:"var(--red)"}}>This cannot be undone.</span></>,onConfirm:()=>update(prev=>({...prev,trash:(prev.trash||[]).filter(x=>x.id!==item.id)}))});
  const empty=()=>setConfirm({title:"Empty Trash?",message:<>Permanently delete all <strong style={{color:"var(--amber)"}}>{trash.length} items</strong>?<span style={{display:"block",marginTop:6,color:"var(--red)"}}>This cannot be undone.</span></>,onConfirm:()=>update(prev=>({...prev,trash:[]}))});

  return(<div className="fade-in">
    {confirm&&<div className="modal-overlay" onClick={()=>setConfirm(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:340}}>
        <h3>⚠️ {confirm.title}</h3>
        <p style={{fontSize:14,color:"var(--text)",lineHeight:1.7,marginBottom:18}}>{confirm.message}</p>
        <div className="modal-btns">
          <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button>
          <button style={{background:"var(--red)",color:"#fff",border:"none",padding:"6px 16px",borderRadius:"var(--radius)",fontFamily:"IBM Plex Mono,monospace",fontSize:12,cursor:"pointer"}} onClick={()=>{confirm.onConfirm();setConfirm(null);}}>Delete Forever</button>
        </div>
      </div>
    </div>}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:11,color:"var(--text3)"}}>{trash.length===0?"Trash is empty":`${trash.length} item${trash.length!==1?"s":""} in trash`}</div>
      {trash.length>0&&<button className="btn btn-sm" style={{background:"var(--red)",color:"#fff",border:"none"}} onClick={empty}>🗑 Empty Trash</button>}
    </div>
    {trash.length===0
      ?<div className="empty"><div className="empty-icon">🗑️</div><p>Nothing in trash.</p></div>
      :<div>{[...trash].reverse().map(item=>(
        <div key={item.id} className="trash-item">
          <div style={{fontSize:22,flexShrink:0}}>{item.subtree?.type==="folder"?"📁":"📄"}</div>
          <div className="trash-item-info">
            <div className="trash-item-name">{item.name}</div>
            <div className="trash-item-meta">Deleted {fmt(item.deletedAt)}</div>
          </div>
          <div className="trash-actions">
            <button className="btn btn-ghost btn-sm" onClick={()=>restore(item)}>↩ Restore</button>
            <button className="btn btn-sm" style={{background:"none",border:"1px solid var(--red)",color:"var(--red)"}} onClick={()=>permDel(item)}>✕</button>
          </div>
        </div>
      ))}</div>}
  </div>);
}

function SearchView(){
  const {data,searchQ,setActiveId,setView,setSearchQ,filterTag,setFilterTag}=useApp();
  const tags=[...new Set(Object.values(data.entries).flatMap(e=>e.tags||[]))].sort();
  const q=searchQ.toLowerCase(),results=[];
  const walk=(node,path=[])=>{const p=[...path,node.name];if(node.type==="entry"){const entry=data.entries[node.id];if(node.name.toLowerCase().includes(q)||entry?.tags?.some(t=>t.toLowerCase().includes(q)))results.push({node,path:p.slice(0,-1),entry});}(node.children||[]).forEach(c=>walk(c,p));};
  walk(data.tree);
  const filtered=filterTag?results.filter(r=>r.entry?.tags?.includes(filterTag)):results;
  return(<div className="fade-in">
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
      {tags.map(t=><span key={t} className={`filter-tag${filterTag===t?" active":""}`} onClick={()=>setFilterTag(filterTag===t?"":t)}>{t}</span>)}
    </div>
    {filtered.length===0
      ?<div className="empty"><div className="empty-icon">🔍</div><p>No results for "<strong>{searchQ}</strong>"</p></div>
      :<div className="search-results">{filtered.map(({node,path,entry})=>(
        <div key={node.id} className="search-result" onClick={()=>{setActiveId(node.id);setView("node");setSearchQ("");}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:14,color:"var(--text)"}}>{node.name}</div>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"IBM Plex Mono,monospace",marginTop:3}}>{path.join(" › ")}</div>
          {entry?.tags?.length>0&&<div style={{display:"flex",gap:4,marginTop:5}}>{entry.tags.map(t=><span key={t} className="tag">{t}</span>)}</div>}
        </div>
      ))}</div>}
  </div>);
}

// TREE NODE

function TreeNode({node,depth=0,parentId="root"}){
  const {activeId,setActiveId,setView,setSearchQ,showCompare,compareIds,handleSelectEntry,update,setModal}=useApp();
  const [open,setOpen]=useState(depth<2);
  const isFolder=node.type==="folder",isActive=activeId===node.id&&!showCompare,isChecked=compareIds.includes(node.id);
  const handleClick=()=>{if(showCompare&&!isFolder){handleSelectEntry(node.id);return;}if(isFolder)setOpen(o=>!o);setActiveId(node.id);setView("node");setSearchQ("");};

  const reorder=dir=>update(prev=>{
    const parent=findNode(prev.tree,parentId);
    if(!parent)return prev;
    const siblings=parent.children||[];
    const idx=siblings.findIndex(c=>c.id===node.id);
    if(idx<0)return prev;
    const toIdx=idx+dir;
    if(toIdx<0||toIdx>=siblings.length)return prev;
    return{...prev,tree:reorderChildren(prev.tree,parentId,idx,toIdx)};
  });

  return(<div>
    <div style={{display:"flex",alignItems:"center"}}>
      <div className={`tree-row${isActive?" active":""}${isChecked?" active":""}`} style={{paddingLeft:8+depth*16,flex:1}} onClick={handleClick}>
        {isFolder?<span className="tree-toggle">{open?"▾":"▸"}</span>:<span className="tree-toggle">{showCompare&&<input type="checkbox" className="entry-select-check" checked={isChecked} onChange={()=>handleSelectEntry(node.id)} onClick={e=>e.stopPropagation()}/>}</span>}
        <span className="tree-icon">{isFolder?(open?"📂":"📁"):"📄"}</span>
        <span className="tree-label">{node.name}</span>
        {!showCompare&&isFolder&&<span className="tree-actions"><button className="tree-btn" onClick={e=>{e.stopPropagation();setModal({type:"add",parentId:node.id});}}>+</button></span>}
      </div>
      {!showCompare&&node.id!=="root"&&<div style={{display:"flex",flexDirection:"column",flexShrink:0}}>
        <button onPointerDown={e=>{e.stopPropagation();e.preventDefault();reorder(-1);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:9,padding:"2px 6px",lineHeight:1,touchAction:"none"}}>▲</button>
        <button onPointerDown={e=>{e.stopPropagation();e.preventDefault();reorder(1);}}  style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:9,padding:"2px 6px",lineHeight:1,touchAction:"none"}}>▼</button>
      </div>}
    </div>
    {isFolder&&open&&(node.children||[]).map(c=><TreeNode key={c.id} node={c} depth={depth+1} parentId={node.id}/>)}
  </div>);
}

// ════════════════════════════════════════════════════════════════════════════
function AddModal(){
  const {data,update,modal,setModal,setActiveId,setView}=useApp();
  const [name,setName]=useState(""); const [type,setType]=useState("entry");
  const inputRef=useRef();
  useEffect(()=>{const t=setTimeout(()=>inputRef.current?.focus(),100);return()=>clearTimeout(t);},[]);
  const doAdd=()=>{
    if(!name.trim())return;
    const newId=uid();
    const newNode=type==="folder"?{id:newId,name:name.trim(),type:"folder",children:[]}:{id:newId,name:name.trim(),type:"entry"};
    update(prev=>{
      const newTree=updateNodeTree(prev.tree,modal.parentId,n=>({...n,children:[...(n.children||[]),newNode]}));
      const newEntries=type==="entry"?{...prev.entries,[newId]:{id:newId,name:name.trim(),fields:prev.globalColumns.reduce((a,c)=>({...a,[c]:[]}),{}),tags:[]}}:prev.entries;
      return{...prev,tree:newTree,entries:newEntries};
    });
    setModal(null);if(type==="entry"){setActiveId(newId);setView("node");}
  };
  return(<div className="modal-overlay" onClick={()=>setModal(null)}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>Add New Item</h3>
      <select value={type} onChange={e=>setType(e.target.value)}><option value="entry">📄 Entry</option><option value="folder">📁 Folder</option></select>
      <input ref={inputRef} placeholder="Name…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
      <div className="modal-btns"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-amber" onClick={doAdd}>Add</button></div>
    </div>
  </div>);
}

function RenameModal(){
  const {data,update,modal,setModal}=useApp();
  const node=findNode(data.tree,modal.nodeId);
  const [name,setName]=useState(node?.name||"");
  const inputRef=useRef();
  useEffect(()=>{const t=setTimeout(()=>inputRef.current?.focus(),100);return()=>clearTimeout(t);},[]);
  const doRename=()=>{
    if(!name.trim())return;
    update(prev=>{const newTree=updateNodeTree(prev.tree,modal.nodeId,n=>({...n,name:name.trim()}));const newEntries=prev.entries[modal.nodeId]?{...prev.entries,[modal.nodeId]:{...prev.entries[modal.nodeId],name:name.trim()}}:prev.entries;return{...prev,tree:newTree,entries:newEntries};});
    setModal(null);
  };
  return(<div className="modal-overlay" onClick={()=>setModal(null)}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>Rename</h3>
      <input ref={inputRef} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doRename()}/>
      <div className="modal-btns"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-amber" onClick={doRename}>Rename</button></div>
    </div>
  </div>);
}

function AddColModal(){
  const {update,setModal}=useApp();
  const [name,setName]=useState("");
  const inputRef=useRef();
  useEffect(()=>{const t=setTimeout(()=>inputRef.current?.focus(),100);return()=>clearTimeout(t);},[]);
  const doAdd=()=>{
    if(!name.trim())return;
    const col=name.trim();
    update(prev=>({...prev,globalColumns:[...prev.globalColumns,col],entries:Object.fromEntries(Object.entries(prev.entries).map(([id,e])=>[id,{...e,fields:{...e.fields,[col]:[]}}]))}));
    setModal(null);
  };
  return(<div className="modal-overlay" onClick={()=>setModal(null)}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>Add Column</h3>
      <input ref={inputRef} placeholder="Column name…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
      <div className="modal-btns"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-amber" onClick={doAdd}>Add</button></div>
    </div>
  </div>);
}

function MoveModal(){
  const {data,update,modal,setModal}=useApp();
  const isCopy=modal.isCopy; const nodeId=modal.nodeId;
  const node=findNode(data.tree,nodeId);
  const [selectedFolderId,setSelectedFolderId]=useState(()=>{
    const path=getPath(data.tree,nodeId);
    return path&&path.length>0?path[path.length-1].id:"root";
  });
  const nodeDescendantIds=new Set(getAllEntries(node||{id:nodeId,type:"entry"}));
  nodeDescendantIds.add(nodeId);
  const folders=[];
  function collectFolders(n,depth=0){if(n.type==="folder"&&!nodeDescendantIds.has(n.id))folders.push({node:n,depth});(n.children||[]).forEach(c=>collectFolders(c,depth+1));}
  collectFolders(data.tree);
  const doMove=()=>{
    if(!node)return;
    update(prev=>{
      if(isCopy){
        const[cloned,idMap]=cloneSubtree(node);
        const oldEntryIds=getAllEntries(node);
        const newEntries={...prev.entries};
        oldEntryIds.forEach(oldId=>{const newId=idMap[oldId];if(prev.entries[oldId])newEntries[newId]={...prev.entries[oldId],id:newId,name:prev.entries[oldId].name+" (copy)"};});
        return{...prev,tree:updateNodeTree(prev.tree,selectedFolderId,f=>({...f,children:[...(f.children||[]),cloned]})),entries:newEntries};
      }else{
        const stripped=removeNodeTree(prev.tree,nodeId);
        return{...prev,tree:updateNodeTree(stripped,selectedFolderId,f=>({...f,children:[...(f.children||[]),node]}))};
      }
    });
    setModal(null);
  };
  return(<div className="modal-overlay" onClick={()=>setModal(null)}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>{isCopy?"📋 Copy":"📦 Move"} "{node?.name}"</h3>
      <div style={{fontSize:12,color:"var(--text3)",fontFamily:"IBM Plex Mono,monospace",marginBottom:8}}>SELECT DESTINATION FOLDER:</div>
      <div className="folder-picker">
        {folders.map(({node:f,depth})=>(
          <div key={f.id} className={`fp-row${selectedFolderId===f.id?" selected":""}`} style={{paddingLeft:12+depth*14}} onClick={()=>setSelectedFolderId(f.id)}>
            <span>{selectedFolderId===f.id?"📂":"📁"}</span><span>{f.name}</span>
          </div>
        ))}
      </div>
      <div className="modal-btns"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-amber" onClick={doMove}>{isCopy?"Copy here":"Move here"}</button></div>
    </div>
  </div>);
}

function ConfirmModal(){
  const {modal,setModal}=useApp();
  return(<div className="modal-overlay" onClick={()=>setModal(null)}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:340}}>
      <h3>🗑 Confirm Delete</h3>
      <p style={{fontSize:14,color:"var(--text)",lineHeight:1.7,marginBottom:18}}>
        Are you sure you want to delete <strong style={{color:"var(--amber)"}}>{modal.name}</strong>?
        {modal.isFolder&&<span style={{display:"block",marginTop:6,fontSize:12,color:"var(--text3)"}}>This will also delete all entries inside it.</span>}
        <span style={{display:"block",marginTop:6,fontSize:12,color:"var(--text3)"}}>You can restore it from Trash.</span>
      </p>
      <div className="modal-btns">
        <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
        <button style={{background:"var(--red)",color:"#fff",border:"none",padding:"6px 16px",borderRadius:"var(--radius)",fontFamily:"IBM Plex Mono,monospace",fontSize:12,cursor:"pointer"}}
          onClick={()=>{modal.onConfirm();setModal(null);}}>Delete</button>
      </div>
    </div>
  </div>);
}

// SIGN-IN SCREEN
// ════════════════════════════════════════════════════════════════════════════
function SignInScreen({onSignedIn=()=>{}}){
  const [loading,setLoading] = useState(false);
  const [error,setError]     = useState("");

  const handleSignIn = async () => {
    setLoading(true); setError("");
    try {
      const {auth, GoogleAuthProvider} = window._firebase;
      const provider = new GoogleAuthProvider();
      await auth.signInWithPopup(provider);
      onSignedIn();
    } catch(e) {
      if (e.code !== "auth/popup-closed-by-user") setError(e.message);
      setLoading(false);
    }
  };

  return(<div style={{
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
    height:"100vh",background:"#0d1117",padding:"40px 24px",gap:0,
  }}>
    <div style={{position:"relative",marginBottom:24}}>
      <div style={{position:"absolute",inset:-30,background:"radial-gradient(circle,rgba(212,160,23,0.18) 0%,transparent 70%)",borderRadius:"50%"}}/>
      <div style={{fontSize:64,position:"relative"}}>📚</div>
    </div>
    <div style={{fontFamily:"Playfair Display,serif",fontSize:36,color:"#d4a017",letterSpacing:2,marginBottom:6}}>MedWiki</div>
    <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:12,color:"#4b5563",letterSpacing:3,textTransform:"uppercase",marginBottom:40}}>Medical Knowledge Base</div>
    <button onClick={handleSignIn} disabled={loading} className="google-btn" style={{width:"100%",maxWidth:300,justifyContent:"center"}}>
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style={{width:22,height:22}}/>
      {loading ? "Signing in…" : "Sign in with Google"}
    </button>
    {error && <div style={{marginTop:12,color:"#e05c5c",fontSize:12,fontFamily:"IBM Plex Mono,monospace",textAlign:"center",maxWidth:300}}>{error}</div>}
    <div style={{marginTop:20,fontSize:11,color:"#374151",fontFamily:"IBM Plex Mono,monospace",textAlign:"center",maxWidth:280,lineHeight:1.8}}>
      Your notes are private and synced across all your devices via your Google account.
    </div>
  </div>);
}

// ════════════════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════════════════
function App(){
  const [user,setUser]           = useState(null);
  const [data,setData]           = useState(null);
  const [authReady,setAuthReady] = useState(false);
  const [isOnline,setIsOnline]   = useState(navigator.onLine);
  const [saveStatus,setSaveStatus] = useState("");

  const dataRef                  = useRef(null);
  const [activeId,setActiveId]       = useState(null);
  const [searchQ,setSearchQ]         = useState("");
  const [modal,setModal]             = useState(null);
  const [compareIds,setCompareIds]   = useState([]);
  const [showCompare,setShowCompare] = useState(false);
  const [filterTag,setFilterTag]     = useState("");
  const [view,setView]               = useState("node");
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [theme,setTheme]             = useState("dark");

  useEffect(()=>{document.documentElement.className=theme==="light"?"light":"";},[theme]);

  // Online/offline detection
  useEffect(()=>{
    const on  = ()=>setIsOnline(true);
    const off = ()=>setIsOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);

  // Firebase auth listener
  useEffect(()=>{
    const {auth} = window._firebase;
    const unsub = auth.onAuthStateChanged(async u => {
      if (u) {
        const userObj = {uid:u.uid, displayName:u.displayName, email:u.email, photoURL:u.photoURL};
        setUser(userObj);
        try {
          const raw = await fbLoad(u.uid);
          const d = raw ? JSON.parse(raw) : {...INITIAL_DATA};
          if (!d.trash) d.trash = [];
          dataRef.current = d;
          setData(d);
        } catch(e) {
          setData({...INITIAL_DATA});
          dataRef.current = {...INITIAL_DATA};
        }
      } else {
        setUser(null);
        setData(null);
      }
      setAuthReady(true);
    });
    return () => unsub();
  },[]);

  // Save to Firestore (debounced)
  const saveTimer = useRef(null);
  const save = useCallback((d, uid)=>{
    if (!uid) return;
    clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async ()=>{
      try {
        await fbSave(uid, d);
        setSaveStatus("saved");
        setTimeout(()=>setSaveStatus(""),2000);
      } catch(e) {
        setSaveStatus("error");
        setTimeout(()=>setSaveStatus(""),3000);
      }
    }, 800);
  },[]);

  const update = useCallback(fn=>{
    setData(prev=>{
      const next = fn(prev);
      dataRef.current = next;
      save(next, user?.uid);
      return next;
    });
  },[save, user]);

  const handleSelectEntry = useCallback(id=>{
    setCompareIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  },[]);

  const ctx={data,update,dataRef,activeId,setActiveId,searchQ,setSearchQ,modal,setModal,
    compareIds,setCompareIds,showCompare,setShowCompare,filterTag,setFilterTag,view,setView,handleSelectEntry};

  // Loading — waiting for Firebase auth to respond
  if (!authReady) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d1117",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>📚</div>
      <div style={{fontFamily:"Playfair Display,serif",fontSize:20,color:"#d4a017"}}>Loading…</div>
    </div>
  );

  // Not signed in — show sign-in screen
  if (!user) return <SignInScreen onSignedIn={()=>{}} />;

  // Signed in but data not loaded yet
  if (!data) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d1117",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>📚</div>
      <div style={{fontFamily:"Playfair Display,serif",fontSize:20,color:"#d4a017"}}>Loading your notes…</div>
    </div>
  );

  const activeNode=activeId?findNode(data.tree,activeId):null;
  const path=activeId?getPath(data.tree,activeId):null;

  const renderContent=()=>{
    if(view==="trash")  return <TrashView/>;
    if(view==="compare")return <CompareView/>;
    if(showCompare)return(<div className="fade-in">
      <div style={{background:"var(--amber-dim)",border:"1px solid var(--amber)",borderRadius:10,padding:"20px 24px",marginBottom:16}}>
        <div style={{fontFamily:"Playfair Display,serif",fontSize:17,color:"var(--amber2)",marginBottom:8}}>⚖️ Compare Mode</div>
        {compareIds.length>0&&<div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:12,color:"var(--amber2)"}}>✓ {compareIds.length} selected</span>
          <button className="btn btn-amber" onClick={()=>setView("compare")}>Compare ▸</button>
        </div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {Object.values(data.entries).map(entry=>{const checked=compareIds.includes(entry.id);return(
          <div key={entry.id} onClick={()=>handleSelectEntry(entry.id)}
            style={{display:"flex",alignItems:"center",gap:10,background:checked?"var(--amber-dim)":"var(--bg2)",border:`1px solid ${checked?"var(--amber)":"var(--border)"}`,borderRadius:8,padding:"9px 14px",cursor:"pointer",transition:"all .15s"}}>
            <input type="checkbox" className="entry-select-check" checked={checked} readOnly/>
            <span style={{fontFamily:"Playfair Display,serif",fontSize:14,color:checked?"var(--amber2)":"var(--text)"}}>{entry.name}</span>
            <span style={{display:"flex",gap:4,marginLeft:"auto"}}>{entry.tags?.map(t=><span key={t} className="tag">{t}</span>)}</span>
          </div>
        );})}
      </div>
    </div>);
    if(view==="search"||searchQ.trim())return <SearchView/>;
    if(!activeId||!activeNode)return <div className="empty fade-in"><div className="empty-icon">🗂️</div><p>Select an item from the sidebar<br/>or search to get started.</p></div>;
    if(activeNode.type==="folder")return <FolderView node={activeNode}/>;
    if(activeNode.type==="entry") return <EntryView entryId={activeId}/>;
  };

  const titleText=view==="trash"?"🗑 Trash":view==="compare"?"Compare Entries":searchQ.trim()?`Search: ${searchQ}`:activeNode?.name||"Knowledge Base";

  return(<Ctx.Provider value={ctx}>
    <style>{CSS}</style>
    <div id="app">
      {sidebarOpen&&<div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">📚 MedWiki</div>
          {/* User row */}
          <div className="user-row">
            {user?.photoURL && <img className="user-avatar" src={user.photoURL} alt=""/>}
            <span title={isOnline?"Online":"Offline"} style={{width:7,height:7,borderRadius:"50%",background:isOnline?"#4c8":"#6b7280",flexShrink:0}}/>
            <span className="user-name">{user?.displayName||user?.email||""}</span>

            <button className="signout-btn" onClick={()=>{
              window._firebase.auth.signOut();
            }}>Sign out</button>
          </div>
          <div className="search-wrap" style={{marginTop:8}}>
            <span className="search-icon">🔍</span>
            <input className="search-input" placeholder="Search…" value={searchQ}
              onChange={e=>{setSearchQ(e.target.value);if(e.target.value.trim())setView("search");}}
              onKeyDown={e=>e.key==="Escape"&&setSearchQ("")}/>
          </div>
        </div>
        <div className="tree-scroll"><TreeNode node={data.tree} depth={0} parentId="root"/></div>
        {showCompare&&compareIds.length>0&&<div className="compare-bar">
          <span>{compareIds.length} selected</span>
          <button className="btn btn-amber btn-sm" onClick={()=>{setView("compare");setSearchQ("");}}>Compare ▸</button>
        </div>}
        <div className="sidebar-footer">
          <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setModal({type:"add",parentId:"root"})}>+ Add</button>
          <button className={`btn btn-sm ${showCompare?"btn-amber":"btn-ghost"}`}
            onClick={()=>{setShowCompare(v=>!v);if(showCompare){setCompareIds([]);if(view==="compare")setView("node");}}}>⚖️</button>
          <button className="btn btn-ghost btn-sm" title={theme==="dark"?"Switch to day theme":"Switch to night theme"}
            onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>
            {theme==="dark"?"☀️":"🌙"}
          </button>
          <button className={`btn btn-sm ${view==="trash"?"btn-amber":"btn-ghost"}`} style={{position:"relative"}}
            onClick={()=>setView(v=>v==="trash"?"node":"trash")}>
            🗑{(data.trash||[]).length>0&&<span style={{position:"absolute",top:-4,right:-4,background:"var(--red)",color:"#fff",borderRadius:"50%",fontSize:9,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center"}}>{(data.trash||[]).length}</span>}
          </button>
        </div>
      </div>}
      <div className="main">
        <div className="topbar">
          <button className="btn btn-ghost btn-sm" onClick={()=>setSidebarOpen(v=>!v)}>{sidebarOpen?"◀":"▶"}</button>
          <div className="topbar-title">
            {activeNode?.type==="entry"
              ?<input value={activeNode.name} onChange={e=>{const val=e.target.value;update(prev=>({...prev,tree:updateNodeTree(prev.tree,activeId,n=>({...n,name:val})),entries:{...prev.entries,[activeId]:{...prev.entries[activeId],name:val}}}));}}/>
              :activeNode?.type==="folder"&&activeNode.id!=="root"&&view==="node"
              ?<input value={activeNode.name} onChange={e=>{const val=e.target.value;update(prev=>({...prev,tree:updateNodeTree(prev.tree,activeId,n=>({...n,name:val}))}));}}/>
              :titleText}
          </div>
          {/* Save indicator */}
          {saveStatus&&<span style={{fontSize:11,fontFamily:"IBM Plex Mono,monospace",color:saveStatus==="saved"?"#4c8":saveStatus==="error"?"#e05c5c":"var(--text3)"}}>
            {saveStatus==="saving"?"⏳ Saving…":saveStatus==="error"?"✗ Save failed":"✓ Saved"}
          </span>}
          {activeNode&&activeNode.id!=="root"&&view==="node"&&(()=>{
            return(<>
              <button className="btn btn-ghost btn-sm" title="Move to folder" onClick={()=>setModal({type:"move",nodeId:activeNode.id,isCopy:false})}>📦</button>
              {activeNode.type==="entry"&&<button className="btn btn-ghost btn-sm" title="Copy to folder" onClick={()=>setModal({type:"move",nodeId:activeNode.id,isCopy:true})}>📋</button>}
              <button className="btn btn-ghost btn-sm" style={{color:"var(--red)",borderColor:"var(--red)",flexShrink:0}} onClick={()=>{
                const snap=JSON.parse(JSON.stringify(activeNode));
                setModal({type:"confirm",name:snap.name,isFolder:snap.type==="folder",onConfirm:()=>{
                  const entryIds=getAllEntries(snap);
                  update(prev=>{
                    const entriesCopy={};
                    entryIds.forEach(id=>{if(prev.entries[id])entriesCopy[id]=prev.entries[id];});
                    const pp=getPath(prev.tree,snap.id);
                    const pid=pp&&pp.length>0?pp[pp.length-1].id:"root";
                    return{...prev,tree:removeNodeTree(prev.tree,snap.id),entries:Object.fromEntries(Object.entries(prev.entries).filter(([id])=>!entryIds.includes(id))),trash:[...(prev.trash||[]),{id:uid(),name:snap.name,deletedAt:Date.now(),subtree:snap,parentId:pid,entries:entriesCopy}]};
                  });
                  setActiveId(null);setView("node");
                }});
              }}>🗑</button>
            </>);
          })()}
          {view!=="compare"&&activeNode?.type!=="entry"&&view==="node"&&<button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:"addcol"})}>+ Col</button>}
          {view==="compare"&&<button className="btn btn-ghost btn-sm" onClick={()=>{setCompareIds([]);setShowCompare(false);setView("node");}}>✕ Compare</button>}
        </div>
        <div className="content">
          {path&&view!=="compare"&&!searchQ.trim()&&<div className="breadcrumb">
            {path.map((n,i)=><span key={n.id} onClick={()=>{setActiveId(n.id);setView("node");}}>
              {n.name}{i<path.length-1&&<span style={{color:"var(--border)"}}> › </span>}
            </span>)}
          </div>}
          {renderContent()}
        </div>
      </div>
    </div>
    {modal?.type==="add"     &&<AddModal/>}
    {modal?.type==="rename"  &&<RenameModal/>}
    {modal?.type==="addcol"  &&<AddColModal/>}
    {modal?.type==="move"    &&<MoveModal/>}
    {modal?.type==="confirm" &&<ConfirmModal/>}
  </Ctx.Provider>);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/MedWiki/sw.js");
}
